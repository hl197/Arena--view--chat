<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArenaView — 多视角决策分析</title>
    <meta name="description" content="让 AI 从不同立场辩论，帮你理解决策的全貌" />

    <!-- 手绘风格 SVG filter（全局可用） -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <!-- 手绘抖动滤镜 — 主边框用 -->
        <filter id="hand-drawn-filter">
          <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.3" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <!-- 轻微抖动 — 细线/装饰用 -->
        <filter id="hand-drawn-light">
          <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="1" seed="5" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <!--纸张噪点纹理 -->
        <filter id="paper-texture">
          <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
          <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
        </filter>
      </defs>
        </svg>
  </head>
  <body class="bg-gray-950 text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ARENA_MASTER_KEY=${ARENA_MASTER_KEY:-change-me-in-production}
      - ARENA_SECRET_KEY=${ARENA_SECRET_KEY:-change-me-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # 或使用加密格式: DEEPSEEK_API_KEY_ENC=${DEEPSEEK_API_KEY_ENC}
      - DATABASE_URL=sqlite:///data/arena.db
    volumes:
      - arena_data:/app/data
      - ./memory:/app/memory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  arena_data:
